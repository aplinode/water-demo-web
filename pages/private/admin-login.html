<!DOCTYPE html>

                    "on-primary": "#ffffff",

                    "secondary-fixed-dim": "#96cbff",

                    "inverse-surface": "#313030",
                    "on-secondary-fixed": "#001d33",
                    "surface-container": "#f0eded",

                    "on-tertiary": "#ffffff",
                    "error": "#ba1a1a",
                    "surface-bright": "#fcf9f8",

                    "secondary": "#00639b",
                    "surface-variant": "#e5e2e1",
                    "surface-tint": "#005bbf",
                    "surface-container-lowest": "#ffffff",
                    "tertiary-container": "#007ea2",
                    "primary-fixed-dim": "#acc7ff",
                    "on-primary-container": "#fefcff",

                    "inverse-primary": "#acc7ff",

                    "on-primary-fixed-variant": "#004492",

            },
            "borderRadius": {

            "spacing": {

<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #fcf9f8;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            box-shadow: 0 4px 20px rgba(11, 125, 255, 0.04);
        }
        .water-wave {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 30vh;
            background: linear-gradient(to top, #cee5ff 0%, transparent 100%);
            z-index: -1;
            opacity: 0.4;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-center items-center bg-surface relative overflow-hidden">
<!-- Subtle Background Animation Decor -->
<div class="water-wave"></div>
<div class="absolute top-[-10%] right-[-10%] w-[40vw] h-[40vw] bg-secondary-fixed/20 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-5%] left-[-5%] w-[30vw] h-[30vw] bg-primary-fixed/30 rounded-full blur-[100px]"></div>
<!-- Login Container -->
<main class="w-full max-w-[440px] px-margin-mobile md:px-0 z-10">
<!-- Brand Identity -->
<div class="text-center mb-xl">
<div class="inline-flex items-center justify-center w-16 h-16 bg-primary rounded-xl mb-md shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-on-primary text-[32px]" style="font-variation-settings: 'FILL' 1;">water_drop</span>
</div>
<h1 class="font-display-lg text-display-lg text-primary mb-xs">PureAqua</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Admin Control Center</p>
</div>
<!-- Login Card -->
<div class="bg-surface-container-lowest p-lg md:p-xl rounded-xl shadow-xl border border-outline-variant/30 transition-all duration-500 hover:shadow-2xl">
<form class="space-y-gutter" id="loginForm">
<!-- Email Field -->
<div class="space-y-base">
<label class="font-label-md text-label-md text-on-surface-variant block" for="email">Email Address</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-md flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline group-focus-within:text-primary transition-colors">mail</span>
</div>
<input class="block w-full pl-[52px] pr-md py-3 bg-surface-container-low border-transparent rounded-lg font-body-md text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest focus:border-primary transition-all outline-none" id="email" name="email" placeholder="admin@pureaqua.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-base">
<div class="flex justify-between items-center">
<label class="font-label-md text-label-md text-on-surface-variant block" for="password">Password</label>
<a class="font-label-md text-label-md text-primary hover:underline underline-offset-4 transition-all" href="#">Forgot?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-md flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline group-focus-within:text-primary transition-colors">lock</span>
</div>
<input class="block w-full pl-[52px] pr-[52px] py-3 bg-surface-container-low border-transparent rounded-lg font-body-md text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest focus:border-primary transition-all outline-none" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute inset-y-0 right-0 pr-md flex items-center text-outline hover:text-on-surface transition-colors" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined" id="eye-icon">visibility</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center gap-base">
<input class="w-5 h-5 rounded border-outline-variant text-primary focus:ring-primary bg-surface-container-low" id="remember" name="remember" type="checkbox"/>
<label class="font-label-md text-label-md text-on-surface-variant select-none cursor-pointer" for="remember">Remember this device</label>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary text-on-primary py-4 rounded-lg font-title-md text-title-md shadow-lg shadow-primary/20 hover:bg-primary-container active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-base" type="submit">
<span>Login</span>
<span class="material-symbols-outlined text-[20px]">login</span>
</button>
</form>
<div class="mt-lg pt-lg border-t border-outline-variant/30 text-center">
<p class="font-label-md text-label-md text-on-surface-variant">
                    Authorized personnel only. Access is monitored.
                </p>
</div>
</div>
<!-- Footer Links -->
<footer class="mt-xl flex flex-col md:flex-row items-center justify-center gap-md text-on-surface-variant font-label-md text-label-md opacity-70">
<span>© 2024 PureAqua Premium Water</span>
<div class="hidden md:block w-1 h-1 bg-outline-variant rounded-full"></div>
<a class="hover:text-primary transition-colors" href="#">Security Policy</a>
<div class="hidden md:block w-1 h-1 bg-outline-variant rounded-full"></div>
<a class="hover:text-primary transition-colors" href="#">Help Desk</a>
</footer>
</main>
<!-- Illustrative Product Image (Floating) -->
<div class="fixed top-1/2 left-margin-desktop -translate-y-1/2 hidden lg:block pointer-events-none opacity-20">
<img class="w-64 h-auto object-cover rounded-2xl grayscale" data-alt="A macro studio shot of a crystalline glass water bottle with condensation, set against a pristine clinical white background with soft blue secondary lighting. The image emphasizes extreme purity and high-end professional hydration services, with sharp focus and clean minimalist aesthetic matching the PureAqua brand identity." src="https://lh3.googleusercontent.com/aida-public/AB6AXuC79Q1V7sCWRjIBtpZHasYJD1qkPHN0ggoIbGZni5BAu0rx1xH-nZqv9e6FuKrig-2x3X74rxMTLFaJPXMD3UdCTQw60jljllCpwKzMMmkDOP7bzg-9ZC1A3N0CvKn2u1Z5YdzSl8kP3BSZtzVD9AHHt1sNtse57z43oLlPJ-BrHOAfvZzDUqP3w1lKGRs61coSQqc6z92dgeEjdoeTy4c_952cssnBAWQVGb5VoZrZq6j7Aj5iF1j6OL6PaqEXeQUMIkIbFEKeZTk"/>
</div>
<script>
        function togglePassword() {
            const input = document.getElementById('password');
            const icon = document.getElementById('eye-icon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.textContent = 'visibility_off';
            } else {
                input.type = 'password';
                icon.textContent = 'visibility';
            }
        }

        const form = document.getElementById('loginForm');
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = form.querySelector('button[type="submit"]');
            const originalContent = btn.innerHTML;
            
            // Interaction Feedback
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">refresh</span> <span>Verifying...</span>';
            btn.classList.add('opacity-80', 'cursor-not-allowed');
            
            setTimeout(() => {
                btn.innerHTML = '<span class="material-symbols-outlined">check_circle</span> <span>Access Granted</span>';
                btn.classList.replace('bg-primary', 'bg-green-600');
                
                setTimeout(() => {
                    alert('Redirecting to Admin Dashboard...');
                    btn.innerHTML = originalContent;
                    btn.classList.replace('bg-green-600', 'bg-primary');
                    btn.classList.remove('opacity-80', 'cursor-not-allowed');
                }, 1000);
            }, 1500);
        });

        // Input active state styling
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.classList.add('scale-[1.01]');
            });
            input.addEventListener('blur', () => {
                input.parentElement.classList.remove('scale-[1.01]');
            });
        });
    </script>
</body></html>
